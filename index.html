<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>제휴 매장 쿠폰북</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0a6e55;
    --primary-light: #129170;
    --primary-pale: #e0f5ef;
    --accent: #d85a2e;
    --accent-pale: #faeae3;
    --bg: #f4f6f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --text-sub: #6b7280;
    --text-hint: #9ca3af;
    --border: #e5e7eb;
    --open-color: #059669;
    --closed-color: #9ca3af;
    --fav-on: #e84040;
    --chip-bg: #edf2f0;
    --chip-active-bg: #0a6e55;
    --chip-active-text: #ffffff;
    --shadow-card: 0 1px 4px rgba(0,0,0,0.07);
    --shadow-modal: 0 20px 60px rgba(0,0,0,0.35);
    --radius-card: 14px;
    --radius-chip: 20px;
    --radius-btn: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--primary);
    padding: 14px 16px 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .header-title {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }

  .key-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.92);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ── SEARCH ── */
  .search-wrap {
    background: rgba(255,255,255,0.14);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.22);
    transition: background 0.2s;
  }
  .search-wrap:focus-within {
    background: rgba(255,255,255,0.22);
  }

  .search-icon {
    width: 16px; height: 16px;
    flex-shrink: 0;
    opacity: 0.7;
  }

  .search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 14px;
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.55); }

  .search-clear {
    background: rgba(255,255,255,0.25);
    border: none;
    border-radius: 50%;
    width: 18px; height: 18px;
    color: #fff;
    font-size: 11px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* ── FILTER CHIPS ── */
  .filter-section {
    padding-bottom: 10px;
  }
  .filter-group-label {
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.06em;
    margin-bottom: 5px;
  }
  .filter-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 13px;
    border-radius: var(--radius-chip);
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.82);
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
  }
  .chip:active { transform: scale(0.95); }
  .chip.active {
    background: #fff;
    color: var(--primary);
    border-color: #fff;
    font-weight: 700;
  }

  /* ── BODY ── */
  .body {
    padding: 14px 12px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .section-title:first-child { margin-top: 0; }
  .section-count {
    background: var(--chip-bg);
    color: var(--text-sub);
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 10px;
  }

  /* ── COUPON CARD ── */
  .coupon-card {
    background: var(--card);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    margin-bottom: 8px;
    overflow: hidden;
    animation: slideUp 0.25s ease both;
    border: 1px solid rgba(0,0,0,0.04);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .coupon-card.used {
    opacity: 0.5;
  }

  .coupon-inner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 12px;
  }

  .coupon-thumb {
    width: 54px; height: 54px;
    border-radius: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
  }

  .coupon-info { flex: 1; min-width: 0; }
  .coupon-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .coupon-loc {
    font-size: 11px;
    color: var(--text-hint);
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .coupon-discount {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--accent-pale);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
  }

  .coupon-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }

  .status-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 0;
  }
  .status-badge.open { color: var(--open-color); }
  .status-badge.closed { color: var(--closed-color); }

  .fav-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    color: var(--border);
    transition: transform 0.15s, color 0.15s;
  }
  .fav-btn.on { color: var(--fav-on); }
  .fav-btn:active { transform: scale(1.3); }

  .use-btn {
    background: var(--primary);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 6px 11px;
    border-radius: var(--radius-btn);
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .use-btn:active { transform: scale(0.95); }
  .use-btn.closed { background: var(--border); color: var(--text-hint); cursor: not-allowed; }
  .use-btn.used-done { background: var(--primary-pale); color: var(--primary); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-hint);
  }
  .empty-state .empty-icon { font-size: 20px; font-weight: bold; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 999;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    max-width: 480px;
    left: 50%;
    transform: translateX(-50%);
  }
  .modal-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .modal-sheet {
    width: 100%;
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding-bottom: env(safe-area-inset-bottom, 16px);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }
  .modal-overlay.visible .modal-sheet {
    transform: translateY(0);
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 0;
  }

  .modal-store-header {
    background: var(--primary);
    margin: 12px;
    border-radius: 14px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .modal-store-icon {
    width: 50px; height: 50px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    color: #fff;
    flex-shrink: 0;
  }
  .modal-store-name {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 3px;
  }
  .modal-store-loc {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
  }

  .modal-discount-area {
    text-align: center;
    padding: 18px 20px 10px;
  }
  .modal-discount-big {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .modal-discount-desc {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }

  .modal-divider {
    border: none;
    border-top: 1.5px dashed var(--border);
    margin: 14px 20px;
  }

  .modal-conditions {
    padding: 0 20px;
    margin-bottom: 12px;
  }
  .modal-conditions-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-hint);
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .modal-condition-item {
    font-size: 12px;
    color: var(--text-sub);
    line-height: 1.7;
    display: flex;
    gap: 6px;
  }
  .modal-condition-item::before {
    content: '·';
    color: var(--text-hint);
    flex-shrink: 0;
  }

  .modal-key-box {
    margin: 0 16px 16px;
    background: var(--primary-pale);
    border-radius: 12px;
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-key-icon { font-size: 14px; font-weight: bold; flex-shrink: 0; color: var(--primary); }
  .modal-key-text {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    line-height: 1.4;
  }
  .modal-key-sub {
    font-size: 11px;
    font-weight: 400;
    color: var(--primary-light);
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    padding: 0 16px 16px;
  }
  .modal-close-btn {
    flex: 1;
    background: var(--chip-bg);
    color: var(--text-sub);
    font-size: 13px;
    font-weight: 700;
    padding: 14px 8px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s;
  }
  .modal-close-btn:active { background: var(--border); }

  .modal-map-btn {
    flex: 1.2;
    background: #e0f2fe;
    color: #0284c7;
    font-size: 13px;
    font-weight: 700;
    padding: 14px 8px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s;
  }
  .modal-map-btn:active { background: #bae6fd; }

  .modal-done-btn {
    flex: 2;
    background: var(--primary);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 14px 8px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .modal-done-btn:active { background: var(--primary-light); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1a1a;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 18px;
    border-radius: 24px;
    z-index: 9999;
    opacity: 0;
    transition: all 0.25s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>

      <button class="chip" data-bld="데포 아일랜드">데포 아일랜드</button>
      <button class="chip" data-bld="시사이드">시사이드</button>

      <button class="chip" data-bld="기타">기타</button>
    </div>
  </div>
</header>

<main class="body" id="mainBody">

  <div id="favSection" style="display:none;">
    <div class="section-title">
      [즐겨찾기 목록]
      <span class="section-count" id="favCount">0</span>
    </div>
    <div id="favList"></div>
  </div>

  <div id="allSection">
    <div class="section-title">
      [전체 쿠폰]
      <span class="section-count" id="allCount">0</span>
    </div>
    <div id="allList"></div>
  </div>

  <div class="empty-state no-results" id="emptyState">
    <div class="empty-icon">[결과 없음]</div>
    <p>조건에 맞는 결과가 없습니다.</p>
  </div>

</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-store-header">
      <div class="modal-store-icon" id="modalIcon"></div>
      <div>
        <div class="modal-store-name" id="modalName"></div>
        <div class="modal-store-loc" id="modalLoc"></div>
      </div>
    </div>
    <div class="modal-discount-area">
      <div class="modal-discount-big" id="modalDiscountBig"></div>
      <div class="modal-discount-desc" id="modalDiscountDesc"></div>
    </div>
    <hr class="modal-divider">
    <div class="modal-conditions">
      <div class="modal-conditions-title">이용 조건</div>
      <div id="modalConditions"></div>
    </div>
    <div class="modal-key-box">
      <div class="modal-key-icon">[안내]</div>
      <div>
        <div class="modal-key-text">룸 키를 직원에게 보여주세요.</div>
        <div class="modal-key-sub">베셀 &amp; 레쿠 오키나와 투숙 고객 전용 혜택</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-close-btn" id="modalClose">닫기</button>
      <button class="modal-map-btn" id="modalMap">지도 보기</button>
      <button class="modal-done-btn" id="modalDone">✓ 사용 완료</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── STATE ──
const state = {
  cat: '전체',
  bld: '전체',
  query: '',
  favs: new Set(JSON.parse(localStorage.getItem('favs') || '[]')),
  used: new Set(JSON.parse(localStorage.getItem('used') || '[]')),
  activeModalId: null
};

function saveFavs() {
  localStorage.setItem('favs', JSON.stringify([...state.favs]));
}
function saveUsed() {
  localStorage.setItem('used', JSON.stringify([...state.used]));
}

// ── FILTER ──
function filteredStores() {
  return stores.filter(s => {
    const catOk  = state.cat === '전체' || s.cat === state.cat;
    const bldOk  = state.bld === '전체' || s.bld === state.bld;
    const q      = state.query.trim();
    const queryOk = !q || s.name.includes(q) || s.cat.includes(q) || s.bld.includes(q) || s.discount.includes(q);
    return catOk && bldOk && queryOk;
  });
}

// ── RENDER CARD ──
function renderCard(s) {
  const isFav    = state.favs.has(s.id);
  const isUsed   = state.used.has(s.id);
  const statusCls = s.open ? 'open' : 'closed';
  const statusTxt = s.open ? '영업 중' : '마감';
  const useBtnCls = isUsed ? 'used-done' : (!s.open ? 'closed' : '');
  const useBtnTxt = isUsed ? '✓ 사용 완료' : '지금 사용';

  const card = document.createElement('div');
  card.className = 'coupon-card' + (isUsed ? ' used' : '');
  card.dataset.id = s.id;
  card.innerHTML = `
    <div class="coupon-inner">
      <div class="coupon-thumb" style="background:${s.bg}">${s.emoji}</div>
      <div class="coupon-info">
        <div class="coupon-name">${s.name}</div>
        <div class="coupon-loc">${s.bld} · ${s.detail}</div>
        <span class="coupon-discount">혜택: ${s.discount}</span>
      </div>
      <div class="coupon-right">
        <span class="status-badge ${statusCls}">${statusTxt}</span>
        <button class="fav-btn ${isFav ? 'on' : ''}" data-fav="${s.id}" aria-label="즐겨찾기">${isFav ? '★' : '☆'}</button>
        <button class="use-btn ${useBtnCls}" data-use="${s.id}" ${(!s.open && !isUsed) ? 'disabled' : ''}>${useBtnTxt}</button>
      </div>
    </div>
  `;
  return card;
}

// ── RENDER ALL ──
function render() {
  const list   = filteredStores();
  const favIds = list.filter(s => state.favs.has(s.id));
  const rest   = list.filter(s => !state.favs.has(s.id));

  const favSection = document.getElementById('favSection');
  const favList    = document.getElementById('favList');
  const allList    = document.getElementById('allList');
  const allSection = document.getElementById('allSection');
  const emptyState = document.getElementById('emptyState');

  document.getElementById('favCount').textContent = favIds.length;
  document.getElementById('allCount').textContent = rest.length;

  favList.innerHTML = '';
  allList.innerHTML = '';

  favSection.style.display = favIds.length ? '' : 'none';
  allSection.style.display = list.length ? '' : 'none';
  emptyState.style.display = list.length ? 'none' : 'block';

  favIds.forEach(s => favList.appendChild(renderCard(s)));
  rest.forEach(s   => allList.appendChild(renderCard(s)));
}

// ── OPEN MODAL ──
function openModal(id) {
  const s = stores.find(x => x.id === id);
  if (!s) return;
  state.activeModalId = id;
  document.getElementById('modalIcon').textContent = s.emoji;
  document.getElementById('modalName').textContent = s.name;
  document.getElementById('modalLoc').textContent  = `${s.bld} · ${s.detail} · 영업: ${s.hours}`;
  document.getElementById('modalDiscountBig').textContent  = s.discountBig;
  document.getElementById('modalDiscountDesc').textContent = s.discountDesc;

  const conds = document.getElementById('modalConditions');
  conds.innerHTML = s.conditions.map(c => `<div class="modal-condition-item">${c}</div>`).join('');

  document.getElementById('modalOverlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
  document.body.style.overflow = '';
  state.activeModalId = null;
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── EVENT DELEGATION ──
document.getElementById('mainBody').addEventListener('click', e => {
  const favBtn = e.target.closest('[data-fav]');
  const useBtn = e.target.closest('[data-use]');

  if (favBtn) {
    const id = Number(favBtn.dataset.fav);
    if (state.favs.has(id)) {
      state.favs.delete(id);
      showToast('즐겨찾기에서 제거했습니다.');
    } else {
      state.favs.add(id);
      showToast('즐겨찾기에 추가했습니다.');
    }
    saveFavs();
    render();
  }

  if (useBtn) {
    const id = Number(useBtn.dataset.use);
    const s  = stores.find(x => x.id === id);
    if (!s || useBtn.disabled) return;
    openModal(id);
  }
});

// Modal Actions
document.getElementById('modalDone').addEventListener('click', () => {
  if (state.activeModalId) {
    state.used.add(state.activeModalId);
    saveUsed();
    showToast('사용 완료 처리했습니다.');
    closeModal();
    render();
  }
});

// Modal Map Link
document.getElementById('modalMap').addEventListener('click', () => {
  if (state.activeModalId) {
    const s = stores.find(x => x.id === state.activeModalId);
    if (s) {
      const query = encodeURIComponent(s.name + ' 오키나와 아메리칸 빌리지');
      window.open(`https://www.google.com/maps/search/?api=1&query=${query}`, '_blank');
    }
  }
});

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ── SEARCH ──
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

searchInput.addEventListener('input', () => {
  state.query = searchInput.value;
  searchClear.style.display = state.query ? 'flex' : 'none';
  render();
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  state.query = '';
  searchClear.style.display = 'none';
  render();
});

// ── CATEGORY CHIPS ──
document.getElementById('catFilter').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  state.cat = chip.dataset.cat;
  document.querySelectorAll('#catFilter .chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  render();
});

// ── BUILDING CHIPS ──
document.getElementById('bldFilter').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  state.bld = chip.dataset.bld;
  document.querySelectorAll('#bldFilter .chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  render();
});

// ── INIT ──
render();
</script>
